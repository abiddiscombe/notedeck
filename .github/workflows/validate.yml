name: Validate Pull Requests

on:
  pull_request:
    branches:
      - main

jobs:
  job_validation:
    runs-on: ubuntu-latest
    steps:
      - name: "[ 1 ] Checkout"
        uses: actions/checkout@v3

      - name: "[ 2 ] Setup Node"
        uses: actions/setup-node@v1
        with:
          node-version: 22

      - name: "[ 3 ] Install PNPM"
        uses: pnpm/action-setup@v6
        with:
          version: latest
    
      - name: "[ 4 ] Install Deps"
        run: pnpm install
        
      - name: "[ 5 ] Run Code Quality Checks"
        uses: wearerequired/lint-action@v2
        with:
          eslint: true
          prettier: true
